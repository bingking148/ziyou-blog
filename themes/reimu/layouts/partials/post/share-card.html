{{- if .Site.Params.share_card.enable -}}
<div class="share-card" id="share-card" data-url="{{ .Permalink }}">
  <span class="share-card-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"></circle>
      <circle cx="6" cy="12" r="3"></circle>
      <circle cx="18" cy="19" r="3"></circle>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
    </svg>
  </span>
  <span class="share-card-text">{{ i18n "share_card_text" }}</span>
</div>
<div class="share-card-toast" id="share-card-toast">{{ i18n "share_card_copied" }}</div>
<script>
(function() {
  var card = document.getElementById('share-card');
  var toast = document.getElementById('share-card-toast');
  if (!card || !toast) return;
  card.addEventListener('click', function() {
    var url = card.getAttribute('data-url');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(function() {
        showToast();
      }).catch(function() {
        fallbackCopy(url);
      });
    } else {
      fallbackCopy(url);
    }
  });
  function fallbackCopy(text) {
    var textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      showToast();
    } catch(e) {
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 1500);
    }
    document.body.removeChild(textarea);
  }
  function showToast() {
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 1500);
  }
})();
</script>
{{- end -}}
