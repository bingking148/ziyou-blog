########################################
# Basic Configuration
########################################

menu:
  - name: home
    url: ""
    icon:
  - name: archives
    url: "archives"
    icon:
  - name: about
    url: "about"
    icon:
  - name: friend
    url: "friend"
    icon:

mainSections: ["post"]
yearFormat: "2006"
monthFormat: "2006-01"
dateFormat: "2006-01-02"
timeFormat: "2006-01-02 15:04:05"

author: ZIYOU
email: blog@example.com
description: "记录生活，分享技术"
subtitle:
  typing:
    enable: true
    strings:
      - "解答世间万物"
      - "记录生活点滴"
      - "分享技术心得"
    typeSpeed: 100
    backSpeed: 50
    backDelay: 2000
    startDelay: 300
    loop: true
    shuffle: true
    showCursor: true
    cursorChar: "|"
    smartBackspace: false
  text: "解答世间万物"

banner: "images/banner.jpg"

banner_srcset:
  enable: true
  srcset:
    - src: "images/banner-600w.webp"
      media: "(max-width: 479px)"
    - src: "images/banner-800w.webp"
      media: "(max-width: 799px)"
    - src: "images/banner.webp"
      media: "(min-width: 800px)"

avatar: "88798328f4e66fedf4a2518539c9b35d.jpg"

cover:
toc: true

open_graph:
  enable: true
  options:

excerpt_link: Read More

copyright:

footer:
  since: 2025
  powered: false
  count: true
  busuanzi: true
  icon:
    url: "../images/taichi.png"
    rotate: true
    mask: true

sidebar:
  position: right
  menu: true
  article:
    show_common: true

social:
  github: https://github.com/bingking148
  # 添加更多社交链接（取消注释并填入你的链接）
  # bilibili: https://space.bilibili.com/yourname
  # zhihu: https://zhihu.com/people/yourname
  # email: your-email@example.com
  # rss: /index.xml

widgets:
  - category
  - tag
  - tagcloud
  - recent_posts

category_limits: 10
tag_limits: 10
recent_posts_limits: 5
tagcloud_limits: 20

only_show_capsule_in_index: false
uppercase_capsule: true

show_update_time: false

summary:
  enable: false
  style: 'subtitle'

rss:
  limit: 10
  showFullContent: false
  showCopyright: false

sort_order:
  taxonomy:
    category: date-reverse
    tag: date-reverse
  archive: date-reverse
  home: default

paginate:
  archive:
  post:

########################################
# CSS
########################################

layout:
  max_width: 1350px

triangle_badge:
  enable: false
  icon: github
  link:

anchor_icon:

reimu_cursor:
  enable: true
  cursor:
    default: ../images/cursor/reimu-cursor-default.png
    pointer: ../images/cursor/reimu-cursor-pointer.png
    text: ../images/cursor/reimu-cursor-text.png

icon_font: 4552607_a0oqhord1y

custom_font:
  enable: false
  article:
  code:

font:
  enable: true
  article:
    - Mulish
    - Noto Serif SC
  code:

local_font:
  article:
    - "-apple-system"
    - PingFang SC
    - Microsoft YaHei
    - sans-serif
  code:
    - Menlo
    - Monaco
    - Consolas
    - monospace

dark_mode:
  enable: auto

########################################
# Analytics
########################################

baidu_analytics: false
google_analytics: false
clarity: false

########################################
# Markdown Display
########################################

mermaid:
  zoom: false

code_block:
  expand: 15

clipboard:
  success: 
    en: Copy successfully (*^▽^*)
    zh-CN: 复制成功 (*^▽^*)
    zh-TW: 複製成功 (*^▽^*)
    ja: コピー成功 (*^▽^*)
    pt-BR: Copiado com sucesso (*^▽^*)
  fail: 
    en: Copy failed (ﾟ⊿ﾟ)ﾂ
    zh-CN: 复制失败 (ﾟ⊿ﾟ)ﾂ
    zh-TW: 複製失敗 (ﾟ⊿ﾟ)ﾂ
    ja: コピー失敗 (ﾟ⊿ﾟ)ﾂ
    pt-BR: Falha ao copiar (ﾟ⊿ﾟ)ﾂ
  copyright:
    enable: false
    count: 50
    license_type: by-nc-sa

math:
  katex:
    enable: true
  mathjax:
    enable: false
    options:
      [
        {
          tex:
            {
              tags: "ams",
              useLabelIds: true,
              inlineMath: [["$", "$"], ['\\(', '\\)']],
              displayMath: [["$$", "$$"], ['\\[', '\\]']],
              processEscapes: true,
              processEnvironments: true,
              autoload: { color: [], colorv2: ["color"] },
              packages: { "[+]": ["noerrors"] },
            },
          options:
            {
              skipHtmlTags:
                ["script", "noscript", "style", "textarea", "pre", "code"],
              ignoreHtmlClass: "tex2jax_ignore",
              processHtmlClass: "tex2jax_process",
            },
          loader: { load: ["input/asciimath", "[tex]/noerrors"] },
        },
      ]

########################################
# Comment system
########################################

comment:
  title:
    en: Leave a comment
    zh-CN: 说些什么吧！
    zh-TW: 說些什麼吧！
    ja: コメントを残す
    pt-BR: Deixe um comentário
  default: waline

valine:
  enable: false
  appId:
  appKey:
  pageSize: 10
  avatar: mp
  placeholder: Just go go
  guest_info: nick,mail,link
  recordIP: true
  highlight: true
  visitor: false
  serverURLs:

waline:
  enable: false
  serverURL:
  locale: {}
  emoji:
    - https://unpkg.com/@waline/emojis@1.2.0/weibo
    - https://unpkg.com/@waline/emojis@1.2.0/alus
    - https://unpkg.com/@waline/emojis@1.2.0/bilibili
    - https://unpkg.com/@waline/emojis@1.2.0/qq
    - https://unpkg.com/@waline/emojis@1.2.0/tieba
    - https://unpkg.com/@waline/emojis@1.2.0/tw-emoji
  meta:
    - nick
    - mail
    - link
  requiredMeta:
    - nick
    - mail
  wordLimit: 0
  pageSize: 10
  pageview: true

twikoo:
  enable: false
  envId:
  region:

gitalk:
  enable: false
  clientID:
  clientSecret:
  repo:
  owner:
  admin:
  md5: false

giscus:
  enable: true
  repo: bingking148/ziyou-blog
  repoId: R_kgDOSBFn0g
  category: Announcements
  categoryId: DIC_kwDOSBFn0s4C6vgO
  mapping: pathname
  strict: 0
  reactionsEnabled: 1
  emitMetadata: 0
  inputPosition: bottom
  theme:
    light:
    dark:

disqus:
  enable: false
  shortname:
  count: true

utterances:
  enable: false
  repo: owner/repo
  issue_term: title
  theme: auto

beaudar:
  enable: false
  repo: owner/repo
  branch: main
  issue_term: title
  issue_number:
  theme: auto
  label:
  input_position: top
  comment_order: desc
  keep_theme:
  loading:

########################################
# Search
########################################

algolia_search:
  enable: false
  appID:
  apiKey:
  indexName:
  hits:
    per_page: 10

########################################
# Animation
########################################

preloader:
  enable: true
  text: 
    zh-CN: 加载中...
    zh-TW: 載入中...
    en: Loading...
    ja: 読み込み中...
    pt-BR: Carregando...
  icon:
  rotate: true

animation:
  enable: true
  options:
    header:
      title: slide-up
      subTitle: slide-down
    home:
      post: fade-up
      widget: fade-up
      sidebar: fade-up
    article:
      whole: fade-up
      date: zoom-in
      category: zoom-in
      tag: zoom-in
      comment: zoom-in
      reading: zoom-in
      nav: fade-up
    archive:
      whole: fade-up
      tag: zoom-in
      category: zoom-in
      section: fade-up
      nav: fade-up

firework:
  enable: false
  disable_on_mobile: true
  options:
    excludeElements: ["a", "button"]
    particles:
      - shape: circle
        move: ["emit"]
        easing: easeOutExpo
        colors: ["var(--red-1)", "var(--red-2)", "var(--red-3)", "var(--red-4)"]
        number: 20
        duration: [1200, 1800]
        shapeOptions:
          radius: [16, 32]
          alpha: [0.3, 0.5]
      - shape: circle
        move: ["diffuse"]
        easing: easeOutExpo
        colors: ["var(--red-0)"]
        number: 1
        duration: [1200, 1800]
        shapeOptions:
          radius: 20
          alpha: [0.2, 0.5]
          lineWidth: 6

